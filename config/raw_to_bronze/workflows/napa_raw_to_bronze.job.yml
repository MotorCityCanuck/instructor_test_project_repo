resources:
  jobs:
    napa_raw_to_bronze:
      name: NAPA Raw to Bronze
      description: >
        Databricks job template for the instructor Raw-to-Bronze pipeline.
        Start the job with release_type set to one of: 5k, 50k, 250k.
      max_concurrent_runs: 1
      performance_target: STANDARD
      environments:
        - environment_key: napa_serverless_python
          spec:
            environment_version: "4"
            dependencies:
              - pyyaml
      parameters:
        - name: release_type
          default: 5k
      tags:
        pipeline_name: raw_to_bronze
        owner: instructor
      tasks:
        - task_key: resolve_configuration
          environment_key: napa_serverless_python
          timeout_seconds: 900
          spark_python_task:
            python_file: ${var.script_root}/01_resolve_configuration.py
            parameters:
              - --release-type
              - "{{job.parameters.release_type}}"

        - task_key: validate_release_environment
          environment_key: napa_serverless_python
          timeout_seconds: 1200
          depends_on:
            - task_key: resolve_configuration
          spark_python_task:
            python_file: ${var.script_root}/02_validate_release_environment.py
            parameters:
              - --release-type
              - "{{job.parameters.release_type}}"
              - --run-id
              - "{{tasks.resolve_configuration.values.run_id}}"

        - task_key: validate_raw_inventory
          environment_key: napa_serverless_python
          timeout_seconds: 1800
          depends_on:
            - task_key: validate_release_environment
          spark_python_task:
            python_file: ${var.script_root}/03_validate_raw_inventory.py
            parameters:
              - --release-type
              - "{{job.parameters.release_type}}"
              - --run-id
              - "{{tasks.resolve_configuration.values.run_id}}"

        - task_key: build_bronze_tables
          environment_key: napa_serverless_python
          timeout_seconds: 7200
          depends_on:
            - task_key: validate_raw_inventory
          spark_python_task:
            python_file: ${var.script_root}/04_build_bronze_tables.py
            parameters:
              - --release-type
              - "{{job.parameters.release_type}}"
              - --run-id
              - "{{tasks.resolve_configuration.values.run_id}}"

        - task_key: validate_bronze_reconciliation
          environment_key: napa_serverless_python
          timeout_seconds: 3600
          depends_on:
            - task_key: build_bronze_tables
          spark_python_task:
            python_file: ${var.script_root}/05_validate_bronze_reconciliation.py
            parameters:
              - --release-type
              - "{{job.parameters.release_type}}"
              - --run-id
              - "{{tasks.resolve_configuration.values.run_id}}"

        - task_key: finalize_pipeline_run
          environment_key: napa_serverless_python
          timeout_seconds: 1200
          run_if: ALL_DONE
          depends_on:
            - task_key: resolve_configuration
            - task_key: validate_release_environment
            - task_key: validate_raw_inventory
            - task_key: build_bronze_tables
            - task_key: validate_bronze_reconciliation
          spark_python_task:
            python_file: ${var.script_root}/06_finalize_pipeline_run.py
            parameters:
              - --release-type
              - "{{job.parameters.release_type}}"
              - --run-id
              - "{{tasks.resolve_configuration.values.run_id}}"
